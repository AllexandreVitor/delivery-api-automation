name: Delivery API pipeline

on:
    push:
        branches:
            -main
    pull-request:
        branches:
            -main

jobs:
    security-sast:
        name: 0. SAST (Segurança)
        runs-on: ubuntu-latest
        steps:
            -name: checkout falhas e vulnerabilidades
            uses: ajinabraham/njsscan-action@master
            with:
                args: '.'

    build:
        name: 1. Build
        runs-on: ubuntu-latest
        steps:
            -name: checkout do código
            uses: actions/checkout@v5

            -name: configurar o Node.js
            uses: actions/setup-node@v5
            with:
                node-version: '24'
                cache: 'npm'

            -name: instalar dependências
            run: npm install

            -name: compilar o código
            run: npm run build